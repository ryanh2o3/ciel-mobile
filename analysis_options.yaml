# Very Good Analysis: strict Dart/Flutter defaults. Layer boundaries: import_lint below.
include: package:very_good_analysis/analysis_options.yaml

# Very Good Analysis targets packages; app UI/widgets rarely need dartdoc on every symbol.
linter:
  rules:
    public_member_api_docs: false

import_lint:
  severity: error
  rules:
    domain_no_flutter:
      target: "package:ciel_mobile/domain/**/*.dart"
      from: "package:flutter/**"
      except: []
    domain_no_riverpod:
      target: "package:ciel_mobile/domain/**/*.dart"
      from: "package:flutter_riverpod/**"
      except: []
    domain_no_data:
      target: "package:ciel_mobile/domain/**/*.dart"
      from: "package:ciel_mobile/data/**"
      except: []
    domain_no_features:
      target: "package:ciel_mobile/domain/**/*.dart"
      from: "package:ciel_mobile/features/**"
      except: []
    domain_no_app:
      target: "package:ciel_mobile/domain/**/*.dart"
      from: "package:ciel_mobile/app/**"
      except: []
    data_no_features:
      target: "package:ciel_mobile/data/**/*.dart"
      from: "package:ciel_mobile/features/**"
      except: []
    features_no_data:
      target: "package:ciel_mobile/features/**/*.dart"
      from: "package:ciel_mobile/data/**"
      except: []
    ui_no_data:
      target: "package:ciel_mobile/ui/**/*.dart"
      from: "package:ciel_mobile/data/**"
      except: []
    ui_no_domain:
      target: "package:ciel_mobile/ui/**/*.dart"
      from: "package:ciel_mobile/domain/**"
      except: []
