name: ciel_mobile
description: Ciel Social — Flutter client (iOS + Android).
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  device_info_plus: ^11.2.0
  dio: ^5.8.0+1
  flutter:
    sdk: flutter
  flutter_exif_rotation: ^0.5.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  image_cropper: ^9.0.0
  image_picker: ^1.1.2
  meta: ^1.17.0
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.12.0
  flutter_test:
    sdk: flutter
  import_lint: ^1.0.1
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  adaptive_icon_background: "#5B8DEF"
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
